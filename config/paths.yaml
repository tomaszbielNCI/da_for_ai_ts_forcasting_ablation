# Paths configuration for data access and storage
# Supports Kaggle, local, and URL-based data loading

paths:
  # Data paths with environment detection
  data:
    # Kaggle environment paths
    kaggle:
      train: "/kaggle/input/competitions/ts-forecasting/train.parquet"
      test: "/kaggle/input/competitions/ts-forecasting/test.parquet"
      working: "/kaggle/working/"
    
    # Local environment paths
    local:
      base_dir: "../"
      train: "../data/train.parquet"
      test: "../data/test.parquet"
      working: "./results/"
    
    # Download paths (for teacher/external data)
    download:
      base_dir: "./downloaded_data"
      train_url: "LINK_DO_TRAIN"  # Replace with actual URL
      test_url: "LINK_DO_TEST"   # Replace with actual URL
  
  # Results and outputs
  results:
    base_dir: "./results"
    models: "./results/models"
    shap_plots: "./results/shap_plots"
    predictions: "./results/predictions"
    comparisons: "./results/comparisons"
  
  # Artifacts for final paper
  artifacts:
    base_dir: "./artifacts"
    figures: "./artifacts/figures"
    tables: "./artifacts/tables"
    
  # Notebook paths
  notebooks:
    base_dir: "./notebooks"
    eda: "./notebooks/01_eda_widgets.ipynb"
    ablation: "./notebooks/02_ablation_study.ipynb"
    presentation: "./notebooks/03_presentation.ipynb"

# Environment detection settings
environment:
  auto_detect: true
  kaggle_check_path: "/kaggle/input"
  local_check_path: "../data"
  
# Logging configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/pipeline.log"
