environment:
  auto_detect: true
  kaggle_check_path: /kaggle/input
  local_check_path: ../data
logging:
  file: ./logs/pipeline.log
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: INFO
paths:
  artifacts:
    base_dir: ./artifacts
    figures: ./artifacts/figures
    tables: ./artifacts/tables
  data:
    download:
      base_dir: ./downloaded_data
      # You can use either direct URLs or Google Drive file IDs
      # Google Drive file IDs are recommended for large files (virus scan bypass)
      test_gdrive_id: 1cWxdooyeSSMghsiUdPIDSIXEepLyDEa6
      train_gdrive_id: 19VWQoWImXzuWfx3YpT4zF7ldwanTwGwG
      # Fallback URLs (optional - will be used if GDrive IDs are not specified)
      test_url: https://drive.google.com/uc?export=download&id=1cWxdooyeSSMghsiUdPIDSIXEepLyDEa6
      train_url: https://drive.google.com/uc?export=download&id=19VWQoWImXzuWfx3YpT4zF7ldwanTwGwG
    kaggle:
      test: /kaggle/input/competitions/ts-forecasting/test.parquet
      train: /kaggle/input/competitions/ts-forecasting/train.parquet
      working: /kaggle/working/
    local:
      base_dir: ./
      test: ./data/test.parquet
      train: ./data/train.parquet
      working: ./results/
  notebooks:
    ablation: ./notebooks/02_ablation_study.ipynb
    base_dir: ./notebooks
    eda: ./notebooks/01_eda_widgets.ipynb
    presentation: ./notebooks/03_presentation.ipynb
  results:
    base_dir: ./results
    comparisons: ./results/comparisons
    models: ./results/models
    predictions: ./results/predictions
    shap_plots: ./results/shap_plots
